app:
  jwt:
    secret: ${JWT_SECRET:01234567890123456789012345678901devsecret}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  # OAuth 2.0 Web Client ID (termina en .apps.googleusercontent.com). Proyecto GCP de ejemplo: My First Project.
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  upload:
    dir: ${APP_UPLOAD_DIR:${user.home}/.story/uploads}
  supabase:
    url: ${SUPABASE_URL:}
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}
    bucket: ${SUPABASE_STORAGE_BUCKET:imagenes}
  resend:
    api-key: ${RESEND_API_KEY:}
    from: ${RESEND_FROM:}
    invite-base-url: ${APP_COMPANY_INVITE_URL_BASE:http://localhost:4200/empresa?inviteToken=}

spring:
  application:
    name: story-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

server:
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.hibernate.SQL: warn
