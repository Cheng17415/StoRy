# Desarrollo: Postgres en Supabase (variables en .env del repositorio).
# Session pooler (IPv4): Dashboard → Connect → Session mode.
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    show-sql: true
  flyway:
    baseline-on-migrate: true
    baseline-version: 8

logging:
  level:
    com.story: debug

app:
  resend:
    from: ${RESEND_FROM:StoRy <onboarding@resend.dev>}
